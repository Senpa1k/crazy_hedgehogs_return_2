<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Телефонная книга</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        .parallax {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('phone.jpg');
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            z-index: -2;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

       
        .navbar {
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            color: #000000 !important;
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: 2px;
            position: relative;
            padding-left: 15px;
        }

        .navbar-brand::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 25px;
            background: linear-gradient(135deg, #ff4d4d 0%, #ff1a1a 100%);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.5);
        }

        .nav-link {
            color: #000000 !important;
            font-weight: 500;
            margin: 0 10px;
            position: relative;
            transition: all 0.3s;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #ff4d4d 0%, #ff1a1a 100%);
            transition: width 0.3s;
            border-radius: 2px;
        }

        .nav-link:hover::after {
            width: 80%;
        }

        .main-container {
            display: flex;
            min-height: calc(100vh - 76px);
            margin-top: 76px;
        }

        .contacts-section {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            max-height: calc(100vh - 76px);
            position: relative;
        }

        .empty-section {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .contacts-wrapper {
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.1);
        }

        .contacts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .contacts-header h1 {
            color: #000000;
            font-size: 2rem;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
            margin: 0;
            position: relative;
            display: inline-block;
        }

        .contacts-header h1::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 50%;
            height: 3px;
            background: linear-gradient(135deg, #ff4d4d 0%, #ff1a1a 100%);
            border-radius: 3px;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.5);
        }

        
        .btn-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #000000;
            padding: 10px 20px;
            border-radius: 50px;
            transition: all 0.3s;
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 1);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            color: #000000;
            border: 1px solid #ff4d4d;
        }

         .search-glass::placeholder {
            color: rgba(0, 0, 0, 0.6);
        }

        .search-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #000000;
            padding: 12px 20px;
            border-radius: 50px;
            width: 100%;
            margin-bottom: 25px;
            transition: all 0.3s;
        }

        .search-glass:focus {
            border-color: #ff4d4d;
            outline: none;
            color: #000000;
            box-shadow: 0 0 0 3px rgba(255, 77, 77, 0.3);
            background: rgba(255, 255, 255, 1);
        }

        .table-glass {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .table-glass thead th {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            color: #000000;
            font-weight: 600;
            padding: 15px;
            border: none;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .table-glass thead th:first-child {
            border-radius: 20px 0 0 20px;
        }

        .table-glass thead th:last-child {
            border-radius: 0 20px 20px 0;
        }

     
        .table-glass tbody tr {
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            transition: all 0.3s;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .table-glass tbody tr:hover {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.01);
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .table-glass tbody td {
            padding: 15px;
            color: #000000;
            border: none;
            font-weight: 500;
        }

        .table-glass tbody td:first-child {
            border-radius: 20px 0 0 20px;
        }

        .table-glass tbody td:last-child {
            border-radius: 0 20px 20px 0;
        }

       
        .action-btn {
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #000000;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 3px;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: rgba(255, 77, 77, 0.2);
            transform: scale(1.1);
            border: 1px solid #ff4d4d;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.3);
            color: #000000;
        }

        .note-preview {
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #000000;
        }

        .page {
            width: 100%;
        }

        .glass-card {
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #000000;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .glass-card .card-header {
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            color: #000000;
            border-radius: 30px 30px 0 0;
            background: transparent;
            padding: 1rem 1.5rem;
        }

        .glass-card .card-header h4 {
            margin: 0;
            font-weight: 600;
            color: #000000;
        }

        .glass-card .card-body {
            padding: 1.5rem;
            background: transparent;
        }

        .glass-card .card-footer {
            background: transparent;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding: 1rem 1.5rem;
        }

    
        .glass-card .form-control {
            background: rgba(255, 255, 255, 1);
            color: #000000;
            border-radius: 15px;
            transition: all 0.3s;
            padding: 0.75rem 1rem;
        }

        .glass-card .form-control::placeholder {
            color: rgba(0, 0, 0, 0.4);
        }

        .glass-card .form-control:focus {
            background: rgba(255, 255, 255, 1);
            border-color: #ff4d4d;
            box-shadow: 0 0 0 3px rgba(255, 77, 77, 0.2);
            outline: none;
            color: #000000;
        }

        .glass-card .form-label {
            color: #000000;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

      
        #viewContent {
            color: #000000;
        }

        #viewContent p {
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
        }

        #viewContent strong {
            color: #000000;
            margin-right: 10px;
        }

       
        #error404Page {
            display: none;
            position: fixed;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .error-container-404 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
        }

        .error-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .error-code-404 {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            color: #ff4d4d;
            text-shadow: 0 0 30px rgba(255, 77, 77, 0.3);
            margin-bottom: 1rem;
        }

        .error-message-404 {
            font-size: 2rem;
            font-weight: 600;
            color: #000000;
            margin-bottom: 1rem;
        }

        .error-description-404 {
            color: #666;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .error-btn-404 {
            background: linear-gradient(135deg, #ff4d4d 0%, #ff1a1a 100%);
            border: none;
            color: white;
            padding: 12px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .error-btn-404:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 77, 77, 0.4);
            border: 2px solid white;
        }

       
        .contacts-section::-webkit-scrollbar {
            width: 8px;
        }
 .contacts-section::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .contacts-section::-webkit-scrollbar-thumb {
            background: rgba(255, 77, 77, 0.5);
            border-radius: 10px;
        }

        .contacts-section::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 77, 77, 0.7);
        }

       
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 100;
            pointer-events: none;
        }

        .footer-content {
            position: relative;
            width: 100%;
            height: 80px;
            pointer-events: none;
        }

        .footer-wave {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 30%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 100% 0 0 0;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1);
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            padding-right: 30px;
        }

        .footer-text {
            color: #000000;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

       
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            
            .contacts-section {
                max-height: none;
            }

            .footer-wave {
                width: 50%;
            }

            .error-code-404 {
                font-size: 4rem;
            }

            .error-message-404 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
   
    <div class="parallax"></div>
    

    <div class="parallax"></div>

    <div class="main-container">
        <div class="contacts-section">
            <div id="mainPage" class="page">
                <div class="contacts-wrapper">
                    <div class="contacts-header">
                        <h1>Контакты</h1>
                        <button class="btn-glass" onclick="showPage('add')">
                            <i class="bi bi-plus-circle"></i> Добавить
                        </button>
                    </div>

                    <input type="text" class="search-glass" id="searchInput" placeholder="Поиск по имени или телефону...">

                    <div id="contactsContainer">
                    </div>
                </div>
            </div>

           
        <div id="addPage" class="page" style="display: none;">
            <div class="glass-card card">
                <div class="card-header">
                    <h4>Новый контакт</h4>
                </div>
                <div class="card-body">
                    <form id="addForm">
                        <div class="mb-3">
                            <label class="form-label">ФИО</label>
                            <input type="text" class="form-control" id="addName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Телефон</label>
                            <input type="tel" class="form-control" id="addPhone" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Заметка</label>
                            <textarea class="form-control" id="addNote" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn-glass">Сохранить</button>
                        <button type="button" class="btn-glass" onclick="showPage('main')">Отмена</button>
                    </form>
                </div>
            </div>
        </div>

            
            <div id="viewPage" class="page" style="display: none;">
                <div class="glass-card card">
                    <div class="card-header">
                        <h4>Информация о контакте</h4>
                    </div>
                    <div class="card-body" id="viewContent"></div>
                    <div class="card-footer">
                        <button class="btn-glass" onclick="deleteCurrentContact()">Удалить</button>
                        <button class="btn-glass" onclick="showPage('main')">Назад</button>
                    </div>
                </div>
            </div>

            
            <div id="editPage" class="page" style="display: none;">
                <div class="glass-card card">
                    <div class="card-header">
                        <h4>Редактирование контакта</h4>
                    </div>
                    <div class="card-body">
                        <form id="editForm">
                            <div class="mb-3">
                                <label class="form-label">ФИО</label>
                                <input type="text" class="form-control" id="editName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Телефон</label>
                                <input type="tel" class="form-control" id="editPhone" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Заметка</label>
                                <textarea class="form-control" id="editNote" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn-glass">Обновить</button>
                            <button type="button" class="btn-glass" onclick="showPage('main')">Отмена</button>
                        </form>
                    </div>
                </div>
            </div>

            
        <div id="error404Page" class="page" style="display: none;">
            <div class="error-container-404">
                <div class="error-card">
                    <div class="error-code-404">404</div>
                    <div class="error-message-404">Страница не найдена</div>
                    <div class="error-description-404">
                        Что-то пошло не так
                    </div>
                    <button class="error-btn-404" onclick="showPage('main')">
                        <i class="bi bi-house-door-fill me-2"></i>На главную
                    </button>
                </div>
            </div>
        </div>
        <div class="empty-section"></div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-wave">
                <span class="footer-text">@2026 Phone Directory Project</span>
            </div>
        </div>
    </footer>

        <script>
        let contacts = [];
        let currentId = null;

        document.addEventListener('DOMContentLoaded', function() {
            showPage('main');
        
            document.getElementById('addForm').addEventListener('submit', (e) => {
                e.preventDefault();
                addContact();
            });
            
            document.getElementById('editForm').addEventListener('submit', (e) => {
                e.preventDefault();
                updateContact();
            });

            document.getElementById('searchInput').addEventListener('input', function(e) {
                searchContacts(e.target.value);
            });
        });

        // Загрузка контактов из БД (C++ Backend)
        async function loadContacts() {
            try {
                const response = await fetch('/api/contacts');
                contacts = await response.json();
                displayContacts(contacts);
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }
        }

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            if (page === 'main') {
                document.getElementById('mainPage').style.display = 'block';
                loadContacts(); // Запрашиваем из БД при открытии главной
            } else if (page === 'add') {
                document.getElementById('addPage').style.display = 'block';
                clearForm('add');
            } else if (page === '404') {
                document.getElementById('error404Page').style.display = 'block';
            }
        }

        function displayContacts(contactsToShow = contacts) {
            const container = document.getElementById('contactsContainer');
            if (!contactsToShow || contactsToShow.length === 0) {
                container.innerHTML = '<p class="text-center" style="color: #000000;">Контакты не найдены</p>';
                return;
            }

            let html = '<table class="table-glass"><thead><tr><th>#</th><th>ФИО</th><th>Телефон</th><th>Заметка</th><th></th></tr></thead><tbody>';
            contactsToShow.forEach((c, i) => {
                html += `<tr>
                    <td>${i+1}</td>
                    <td>${escapeHtml(c.name)}</td>
                    <td>${escapeHtml(c.phone)}</td>
                    <td><div class="note-preview">${escapeHtml(c.note) || '-'}</div></td>
                    <td>
                        <button class="action-btn" onclick='viewContact(${c.id})' title="Просмотр"><i class="bi bi-eye"></i></button>
                        <button class="action-btn" onclick='editContact(${c.id})' title="Редактировать"><i class="bi bi-pencil"></i></button>
                        <button class="action-btn" onclick='deleteContact(${c.id})' title="Удалить"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function searchContacts(query) {
            const search = query.toLowerCase();
            const filtered = contacts.filter(c => 
                c.name.toLowerCase().includes(search) || 
                c.phone.includes(search)
            );
            displayContacts(filtered);
        }

        function viewContact(id) {
            const contact = contacts.find(c => c.id === id);
            if (!contact) return showPage('404');
            currentId = id;
            document.getElementById('viewContent').innerHTML = `
                <p><strong>ФИО:</strong> ${escapeHtml(contact.name)}</p>
                <p><strong>Телефон:</strong> ${escapeHtml(contact.phone)}</p>
                <p><strong>Заметка:</strong> ${escapeHtml(contact.note) || '-'}</p>
            `;
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('viewPage').style.display = 'block';
        }

        function editContact(id) {
            const contact = contacts.find(c => c.id === id);
            if (!contact) {
                console.error('Контакт с ID', id, 'не найден');
                showPage('404');
                return;
            }
            currentId = id;
            document.getElementById('editName').value = contact.name;
            document.getElementById('editPhone').value = contact.phone;
            document.getElementById('editNote').value = contact.note || '';
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('editPage').style.display = 'block';
            console.log('Редактирование контакта:', id, contact);
        }

        function editCurrentContact() { editContact(currentId); }

        // Отправка нового контакта (POST)
        async function addContact() {
            const newContact = {
                name: document.getElementById('addName').value,
                phone: document.getElementById('addPhone').value,
                note: document.getElementById('addNote').value
            };
            try {
                await fetch('/api/contacts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newContact)
                });
                showPage('main');
            } catch (error) {
                console.error('Ошибка при добавлении:', error);
            }
        }

        // Обновление контакта (PUT)
        async function updateContact() {
            const id = currentId;
            const updated = {
                name: document.getElementById('editName').value,
                phone: document.getElementById('editPhone').value,
                note: document.getElementById('editNote').value
            };
            try {
                const response = await fetch(`/api/contacts/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updated)
                });
                if (!response.ok) {
                    console.error('Ошибка при обновлении:', response.status, response.statusText);
                    alert('Ошибка при обновлении контакта');
                    return;
                }
                showPage('main');
            } catch (error) {
                console.error('Ошибка при обновлении:', error);
                alert('Ошибка при обновлении: ' + error.message);
            }
        }

        // Удаление контакта (DELETE)
        async function deleteContact(id) {
            if (confirm('Удалить контакт?')) {
                try {
                    await fetch(`/api/contacts/${id}`, { method: 'DELETE' });
                    showPage('main');
                } catch (error) {
                    console.error('Ошибка при удалении:', error);
                }
            }
        }

        function deleteCurrentContact() { deleteContact(currentId); }

        function clearForm(form) {
            if (form === 'add') {
                document.getElementById('addName').value = '';
                document.getElementById('addPhone').value = '';
                document.getElementById('addNote').value = '';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
